# cbindgen config for the C ABI header consumed by the macOS (and any C/C++) frontend.
# Regenerate with: cargo run -p xtask -- gen-header
language = "C"
pragma_once = true
include_guard = "ROMAJI_IME_H"
autogen_warning = "/* GENERATED by cbindgen. Do not edit by hand. Regenerate: cargo run -p xtask -- gen-header */"
usize_is_size_t = true
documentation = true
documentation_style = "c"
cpp_compat = true

[parse]
parse_deps = false

[export]
prefix = ""

[enum]
prefix_with_name = true
