name: release

# Builds a SIGNED + NOTARIZED macOS .pkg. Runs on a version tag (v*) or manually.
# Requires these repository secrets (set them in Settings -> Secrets):
#   MACOS_DEVID_APP_P12        base64 of a .p12 with the "Developer ID Application" cert
#   MACOS_DEVID_INSTALLER_P12  base64 of a .p12 with the "Developer ID Installer" cert
#   MACOS_P12_PASSWORD         password for the .p12 files
#   NOTARY_APPLE_ID            Apple ID email for notarization
#   NOTARY_TEAM_ID             Apple Developer Team ID
#   NOTARY_APP_PASSWORD        app-specific password for notarytool
# Without these the macos.yml workflow already produces an ad-hoc-signed .app.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Import signing certificates
        env:
          APP_P12: ${{ secrets.MACOS_DEVID_APP_P12 }}
          INSTALLER_P12: ${{ secrets.MACOS_DEVID_INSTALLER_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KPW="ci-$(date +%s)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          for var in APP_P12 INSTALLER_P12; do
            echo "${!var}" | base64 --decode > "$RUNNER_TEMP/$var.p12"
            security import "$RUNNER_TEMP/$var.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productbuild
          done
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Resolve identities + notary profile
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          APP_ID=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          INST_ID=$(security find-identity -v | grep "Developer ID Installer" | head -1 | sed -E 's/.*"(.*)"/\1/')
          echo "CODESIGN_IDENTITY=$APP_ID" >> "$GITHUB_ENV"
          echo "INSTALLER_IDENTITY=$INST_ID" >> "$GITHUB_ENV"
          xcrun notarytool store-credentials romaji-ime-notary \
            --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" --password "$NOTARY_APP_PASSWORD"
          echo "NOTARY_PROFILE=romaji-ime-notary" >> "$GITHUB_ENV"

      - name: Build signed + notarized .pkg
        run: bash platform/macos/package.sh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RomajiIME-pkg
          path: platform/macos/build/RomajiIME.pkg

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: platform/macos/build/RomajiIME.pkg
