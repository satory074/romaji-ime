name: windows

# Builds the Windows TSF DLL (x64 + Win32) and the ime-server engine host on a
# real Windows runner. This both VERIFIES the C++ compiles (it can't be built on
# the macOS dev host) and produces installable artifacts to download and test.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, msvc) + ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Test core (native Windows)
        run: cargo test -p ime-engine -p ime-ipc -p ime-server

      - name: Build ime-server (release)
        run: cargo build --release -p ime-server

      - name: Build TSF DLL (x64)
        run: |
          cmake -S platform/windows -B platform/windows/build-x64 -A x64
          cmake --build platform/windows/build-x64 --config Release

      - name: Build TSF DLL (Win32)
        run: |
          cmake -S platform/windows -B platform/windows/build-x86 -A Win32
          cmake --build platform/windows/build-x86 --config Release

      # ARM64 (Windows-on-ARM, e.g. an Apple Silicon Mac VM). Cross-compiled from
      # the x64 runner. Best-effort: if the runner image lacks ARM64 VS build
      # tools the rest of the artifacts still upload.
      - name: Build ime-server (ARM64)
        id: server_arm64
        continue-on-error: true
        run: cargo build --release -p ime-server --target aarch64-pc-windows-msvc

      - name: Build TSF DLL (ARM64)
        id: dll_arm64
        continue-on-error: true
        run: |
          cmake -S platform/windows -B platform/windows/build-arm64 -A ARM64
          cmake --build platform/windows/build-arm64 --config Release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/ime-server.exe dist/
          Copy-Item platform/windows/build-x64/Release/RomajiIME.dll dist/RomajiIME-x64.dll
          Copy-Item platform/windows/build-x86/Release/RomajiIME.dll dist/RomajiIME-Win32.dll
          if (Test-Path target/aarch64-pc-windows-msvc/release/ime-server.exe) {
            Copy-Item target/aarch64-pc-windows-msvc/release/ime-server.exe dist/ime-server-arm64.exe
          } else { Write-Host "::warning::ARM64 ime-server not built — skipping" }
          if (Test-Path platform/windows/build-arm64/Release/RomajiIME.dll) {
            Copy-Item platform/windows/build-arm64/Release/RomajiIME.dll dist/RomajiIME-ARM64.dll
          } else { Write-Host "::warning::ARM64 DLL not built — skipping" }
          Copy-Item platform/windows/README.md dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: romaji-ime-windows
          path: dist/
